name: Deploy to Hetzner

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 65.109.62.25
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /root/skissify
            git pull origin master
            docker compose up -d --build --remove-orphans
            docker image prune -f
            sleep 5
            curl -sf http://localhost:9700/ > /dev/null && echo "Health check OK" || echo "Health check FAILED"
