name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: thejesper/skissify

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thejesper/skissify:latest
            ghcr.io/thejesper/skissify:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 65.109.62.25
          port: 2222
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /root/skissify
            git pull origin master
            docker compose up -d --build --remove-orphans
            docker image prune -f
            sleep 5
            curl -sf http://localhost:9700/ > /dev/null && echo "Health check OK" || echo "Health check FAILED"
