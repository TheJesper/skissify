name: Deploy to Proxmox

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$(echo -n '{}' | openssl dgst -sha256 -hmac '${{ secrets.DEPLOY_WEBHOOK_SECRET }}' | cut -d' ' -f2)" \
            -d '{}' \
            "https://deploy.conzeon.dev/webhook?project=skissify"
